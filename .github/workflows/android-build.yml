name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build signed release APK and AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Pre-flight checks
        run: |
          npx expo install --fix
          npx expo-doctor
          npx expo install --check

      - name: Install Android SDK Platform 35 and Build Tools 35.0.0
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Decode release keystore from GitHub Secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.p12"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.p12" >> "$GITHUB_ENV"

      - name: Prepare Android project (expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Configure release signing
        run: node scripts/enable-release-signing.js

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Build signed release AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Verify APK signature (must not be debug-signed)
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          "$APKSIGNER" verify --print-certs "$APK" | tee apk-certs.txt
          if grep -q "CN=Android Debug" apk-certs.txt; then
            echo "ERROR: Release APK is signed with a debug certificate."
            exit 1
          fi
          echo "APK signature verified: not debug-signed."

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: stackly-glass-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload release AAB (Google Play upload artifact)
        uses: actions/upload-artifact@v4
        with:
          name: stackly-glass-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
